name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # 将爬虫数据复制到前端 public 目录，生成 manifest
      - name: Sync scraper data to frontend
        run: |
          mkdir -p frontend/public/data
          # 复制所有月度 JSON 数据文件
          if ls data/*.json 1>/dev/null 2>&1; then
            cp data/*.json frontend/public/data/
            # 生成 manifest.json（列出所有数据文件）
            cd frontend/public/data
            echo '{"files":[' > manifest.json
            first=true
            for f in *.json; do
              if [ "$f" != "manifest.json" ] && [ "$f" != "brief.json" ] && [ "$f" != "weekly_report.json" ]; then
                if [ "$first" = true ]; then
                  first=false
                else
                  echo ',' >> manifest.json
                fi
                echo "\"$f\"" >> manifest.json
              fi
            done
            echo '],"last_updated":"'$(date -u +%Y-%m-%dT%H:%M:%S)'"}' >> manifest.json
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
